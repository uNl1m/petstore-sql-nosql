services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports: ["3000:3000"]
    env_file: ${ENV_FILE}
    profiles: [mongo, sql]

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 10
    profiles: [mongo]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: petstore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    profiles: [sql]